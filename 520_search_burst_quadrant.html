*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#F4F6FA;color:#1A1A1A}
.wrap{max-width:1360px;margin:0 auto;padding:22px 28px}

/* ── Header ── */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.title{font-size:19px;font-weight:700;color:#111;letter-spacing:.4px}
.subtitle{font-size:11.5px;color:#999;margin-top:5px;line-height:1.6}
.badge{background:linear-gradient(135deg,#FF6B9D,#E8503A);color:#fff;font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;letter-spacing:.5px;white-space:nowrap;margin-top:2px}

/* ── KPI 卡片 ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:#fff;border-radius:12px;padding:15px 17px;border-top:3px solid #ddd;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:box-shadow .2s}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.kpi.q1{border-color:#E8503A}.kpi.q2{border-color:#F5A623}.kpi.q3{border-color:#00A0DC}.kpi.q4{border-color:#9E9E9E}
.kpi-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-bottom:7px;letter-spacing:.3px}
.kpi.q1 .kpi-badge{background:#FFF0EE;color:#E8503A}
.kpi.q2 .kpi-badge{background:#FFF8EC;color:#E07B00}
.kpi.q3 .kpi-badge{background:#EBF6FF;color:#0080C0}
.kpi.q4 .kpi-badge{background:#F5F5F5;color:#777}
.kpi-name{font-size:14px;font-weight:700;color:#111;margin-bottom:8px;line-height:1.3}
.kpi-value{font-size:26px;font-weight:800;color:#111;line-height:1}
.kpi-value span{font-size:12px;font-weight:400;color:#999;margin-left:3px}
.kpi-sub{font-size:11px;color:#888;margin-top:6px}.kpi-sub strong{color:#333;font-weight:600}
.kpi-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.kpi-tag{background:#F7F7F7;border-radius:4px;font-size:10px;color:#666;padding:2px 7px;border:1px solid #EBEBEB}

/* ── 筛选栏 ── */
.filter-section{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);padding:14px 18px;margin-bottom:14px}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-row+.filter-row{margin-top:10px;padding-top:10px;border-top:1px solid #F0F0F0}
.filter-label{font-size:11px;color:#999;font-weight:600;min-width:60px;letter-spacing:.3px}
.cat-chips{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.chip{border:1px solid #E8E8E8;background:#FAFAFA;border-radius:20px;padding:4px 11px;font-size:11px;color:#555;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;user-select:none}
.chip:hover{border-color:#bbb;background:#F0F0F0}
.chip.on{color:#fff;border-color:transparent}
.chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.q-btn{border:1px solid #E8E8E8;background:#FAFAFA;border-radius:8px;padding:5px 13px;font-size:11px;color:#555;cursor:pointer;transition:all .15s;font-weight:500}
.q-btn:hover{border-color:#bbb}
.q-btn.on{color:#fff;border-color:transparent}
.q-btn.q1.on{background:#E8503A}.q-btn.q2.on{background:#E07B00}.q-btn.q3.on{background:#0080C0}.q-btn.q4.on{background:#777}.q-btn.all.on{background:#333}
.gtv-btn{border:1px solid #E8E8E8;background:#FAFAFA;border-radius:8px;padding:5px 13px;font-size:11px;color:#555;cursor:pointer;transition:all .15s}
.gtv-btn:hover{border-color:#bbb}
.gtv-btn.on{background:#333;color:#fff;border-color:#333}

/* ── 图表区 ── */
.chart-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);padding:18px 16px 10px}
#chart{width:100%;height:580px}

/* ── 指标说明（图表下方） ── */
.meta-row{display:flex;gap:10px;margin-top:12px}
.meta-item{flex:1;background:#FAFAFA;border-radius:8px;padding:10px 14px;border:1px solid #F0F0F0}
.meta-label{font-size:10px;font-weight:700;color:#888;margin-bottom:3px;letter-spacing:.3px}
.meta-desc{font-size:11px;color:#555;line-height:1.5}
.meta-item.threshold .meta-desc{color:#E8503A;font-weight:600}
</style>

// ── P70 ──
function percentile(arr,p){
  const s=[...arr].sort((a,b)=>a-b);
  const idx=(p/100)*(s.length-1),lo=Math.floor(idx),hi=Math.ceil(idx);
  return s[lo]+(s[hi]-s[lo])*(idx-lo);
}
const xVals=RAW.map(d=>d.x), yVals=RAW.map(d=>d.y);
const P95_Y=percentile(yVals,95);
const DATA=RAW.map(d=>({...d,yClip:Math.min(d.y,P95_Y)}));
const P70_X=percentile(xVals,70);
const P70_Y=percentile(yVals.filter(v=>v<=P95_Y),70);
const yMax=Math.min(percentile(yVals,97)*1.15,6);

document.getElementById('threshold-text').innerHTML=
  `搜索UV P70 = ${P70_X.toFixed(3)} &nbsp;|&nbsp; 订单 P70 = ${P70_Y.toFixed(3)}`;

// ── 象限 ──
// Q1高搜高转 Q2高搜低转 Q3低搜高转 Q4低搜低转
function getQ(d){
  const hx=d.x>=P70_X,hy=d.y>=P70_Y;
  if(hx&&hy) return 'q1';
  if(hx&&!hy) return 'q2';
  if(!hx&&hy) return 'q3';
  return 'q4';
}

// ── ECharts ──
const chart=echarts.init(document.getElementById('chart'));
let curQ='all', curGtvMin=0;
let hiddenCats=new Set();

function buildSeries(data){
  const byCat={};
  data.forEach(d=>{if(!byCat[d.c1])byCat[d.c1]=[];byCat[d.c1].push(d);});
  return Object.entries(byCat).map(([cat,items])=>({
    name:cat, type:'scatter',
    symbolSize:d=>Math.max(7,Math.sqrt(d[2]/8)*3.2),
    data:items.map(d=>[d.x,d.yClip,d.gtv,d.c3||d.c2,d.q,d.y,d.c2]),
    itemStyle:{color:CAT_COLORS[cat]||'#999',opacity:0.85,
      borderColor:'rgba(255,255,255,0.6)',borderWidth:1},
    emphasis:{scale:1.2,itemStyle:{opacity:1,borderWidth:2,borderColor:'#fff'}}
  }));
}

function getFiltered(){
  return DATA.filter(d=>{
    if(curQ!=='all'&&d.q!==curQ) return false;
    if(d.gtv<curGtvMin) return false;
    if(hiddenCats.has(d.c1)) return false;
    return true;
  });
}

function render(){
  const data=getFiltered();
  const series=buildSeries(data);
  chart.setOption({
    backgroundColor:'#fff',
    grid:{left:58,right:24,top:28,bottom:56},
    tooltip:{
      trigger:'item',
      backgroundColor:'rgba(30,30,30,0.92)',
      borderColor:'transparent',
      textStyle:{color:'#fff',fontSize:12},
      formatter:p=>{
        const [x,yc,gtv,c3,q,yOrig,c2]=p.data;
        const clip=yOrig>yMax?` <span style="opacity:.6;font-size:10px">(截断)</span>`:'';
        return `<div style="font-weight:700;margin-bottom:5px">${p.seriesName}</div>
<div style="color:#ccc;font-size:11px;margin-bottom:6px">${c2} › ${c3}</div>
<div>搜索UV爆发 <b style="color:#FFD666">${x.toFixed(3)}</b></div>
<div>订单爆发 <b style="color:#FFD666">${yOrig.toFixed(3)}</b>${clip}</div>
<div>大促GTV <b style="color:#FFD666">${gtv>=10000?(gtv/10000).toFixed(1)+'亿':gtv.toFixed(0)+'万'}</b></div>
<div style="margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,.15)">
  <span style="background:${Q_COLORS[q]};padding:2px 7px;border-radius:10px;font-size:10px">${Q_NAMES[q]}</span>
</div>`;
      }
    },
    xAxis:{
      name:'搜索UV爆发系数 →',nameLocation:'end',nameGap:8,
      nameTextStyle:{fontSize:11,color:'#AAA'},
      splitLine:{lineStyle:{color:'#F2F2F2',type:'dashed'}},
      axisLine:{lineStyle:{color:'#E0E0E0'}},
      axisTick:{show:false},
      axisLabel:{fontSize:10,color:'#AAA',formatter:v=>v.toFixed(1)}
    },
    yAxis:{
      name:'↑ 订单爆发系数',nameLocation:'end',nameGap:8,
      nameTextStyle:{fontSize:11,color:'#AAA'},
      max:yMax,
      splitLine:{lineStyle:{color:'#F2F2F2',type:'dashed'}},
      axisLine:{lineStyle:{color:'#E0E0E0'}},
      axisTick:{show:false},
      axisLabel:{fontSize:10,color:'#AAA',formatter:v=>v.toFixed(1)}
    },
    series:[
      // 象限背景+分割线+标签
      {type:'custom',renderItem:(params,api)=>{
        const x0=api.coord([P70_X,0]);
        const y0=api.coord([0,P70_Y]);
        const {x:ox,y:oy,width:cw,height:ch}=params.coordSys;
        const px=x0[0],py=y0[1];
        const qFills=[
          // 右上：高搜高转（第一象限）
          {x:px,y:oy,w:ox+cw-px,h:py-oy,c:'rgba(232,80,58,0.05)',label:'高搜高转',lx:px+8,ly:oy+10,lc:'rgba(232,80,58,0.55)'},
          // 左上：低搜高转（第二象限）
          {x:ox,y:oy,w:px-ox,h:py-oy,c:'rgba(0,160,220,0.05)',label:'低搜高转',lx:ox+10,ly:oy+10,lc:'rgba(0,130,190,0.55)'},
          // 右下：高搜低转（第四象限）
          {x:px,y:py,w:ox+cw-px,h:oy+ch-py,c:'rgba(245,166,35,0.05)',label:'高搜低转',lx:px+8,ly:py+8,lc:'rgba(200,120,0,0.55)'},
          // 左下：低搜低转（第三象限）
          {x:ox,y:py,w:px-ox,h:oy+ch-py,c:'rgba(158,158,158,0.05)',label:'低搜低转',lx:ox+10,ly:py+8,lc:'rgba(130,130,130,0.55)'}
        ];
        return {type:'group',children:[
          ...qFills.map(f=>({type:'rect',shape:{x:f.x,y:f.y,width:f.w,height:f.h},style:{fill:f.c}})),
          {type:'line',shape:{x1:px,y1:oy,x2:px,y2:oy+ch},style:{stroke:'#D8D8D8',lineDash:[5,4],lineWidth:1.5}},
          {type:'line',shape:{x1:ox,y1:py,x2:ox+cw,y2:py},style:{stroke:'#D8D8D8',lineDash:[5,4],lineWidth:1.5}},
          ...qFills.map(f=>({type:'text',style:{text:f.label,x:f.lx,y:f.ly,fill:f.lc,fontSize:11,fontWeight:'bold',fontFamily:'PingFang SC,sans-serif'}}))
        ]};
      },data:[0],z:-1,silent:true},
      ...series
    ]
  },{replaceMerge:['series']});
}
render();
window.addEventListener('resize',()=>chart.resize());

// ── 交互 ──
function fq(q,btn){
  curQ=q;
  document.querySelectorAll('.q-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function fqCard(q){
  // 点KPI卡片切换象限
  curQ=(curQ===q)?'all':q;
  document.querySelectorAll('.q-btn').forEach(b=>{
    b.classList.remove('on');
    if((curQ==='all'&&b.classList.contains('all'))||(b.classList.contains(curQ)))b.classList.add('on');
  });
  render();
}
function fg(min,btn){
  curGtvMin=min;
  document.querySelectorAll('.gtv-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function toggleCat(cat,el){
  if(hiddenCats.has(cat)){hiddenCats.delete(cat);el.classList.add('on');el.style.opacity='1';}
  else{hiddenCats.add(cat);el.classList.remove('on');el.style.opacity='0.35';}
  // 同步全选chip
  const allChip=document.getElementById('chip-all');
  allChip.classList.toggle('on',hiddenCats.size===0);
  render();
}
function toggleAll(el){
  if(hiddenCats.size===0){
    // 全部隐藏
    cats.forEach(c=>hiddenCats.add(c));
    document.querySelectorAll('[data-cat]').forEach(e=>{e.classList.remove('on');e.style.opacity='0.35';});
    el.classList.remove('on');
  } else {
    hiddenCats.clear();
    document.querySelectorAll('[data-cat]').forEach(e=>{e.classList.add('on');e.style.opacity='1';});
    el.classList.add('on');
  }
  render();
}
</script>
</body>
</html>
