<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .container { padding: 16px; }
  .filter-bar { background: #fff; border: 1px solid #e0e0e0; padding: 10px 14px; margin-bottom: 10px; border-radius: 3px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { font-size: 12px; font-weight: 600; color: #003366; white-space: nowrap; }
  .filter-btn { padding: 3px 10px; border: 1px solid #ccc; background: #fff; border-radius: 2px; font-size: 12px; cursor: pointer; color: #333; }
  .filter-btn.active { background: #003366; color: #fff; border-color: #003366; }
  .filter-divider { width: 1px; height: 18px; background: #e0e0e0; }
  .summary { display: flex; gap: 10px; margin-bottom: 10px; }
  .sc { background: #fff; border: 1px solid #e0e0e0; padding: 8px 14px; border-radius: 3px; flex: 1; }
  .sc .lbl { font-size: 11px; color: #888; }
  .sc .val { font-size: 15px; font-weight: 700; color: #003366; margin-top: 2px; }
  .table-wrap { background: #fff; border: 1px solid #e0e0e0; border-radius: 3px; overflow: auto; max-height: 600px; }
  .tinfo { padding: 6px 14px; font-size: 11px; color: #888; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; z-index: 10; }
  table { width: 100%; border-collapse: collapse; }
  thead { position: sticky; top: 28px; z-index: 9; }
  thead tr:first-child th { background: #003366; color: #fff; font-weight: 600; font-size: 11px; padding: 8px 9px; text-align: right; white-space: nowrap; border-right: 1px solid #004080; }
  thead tr:first-child th:nth-child(-n+3) { text-align: left; }
  thead tr:first-child th.gh { background: #004d99; text-align: center; font-size: 10px; letter-spacing: 0.4px; }
  thead tr.sh th { background: #1a4d80; font-size: 10px; padding: 5px 9px; color: #cce0ff; text-align: right; white-space: nowrap; }
  thead tr.sh th:nth-child(-n+3) { text-align: left; }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  tbody tr:hover { background: #f0f5ff; }
  td { padding: 6px 9px; font-size: 12px; text-align: right; }
  td:nth-child(-n+3) { text-align: left; }
  td:first-child { color: #003366; font-weight: 500; }
  .bh { color: #c0392b; font-weight: 700; }
  .bm { color: #e67e22; font-weight: 600; }
  .bl { color: #27ae60; }
  .bn { color: #aaa; }
  .no-data { text-align: center; padding: 30px; color: #aaa; }
  select { padding: 3px 7px; border: 1px solid #ccc; border-radius: 2px; font-size: 12px; color: #333; }
</style>
</head>

let fb='all',fg='all',fc_='all';
function fmt(v){if(v==null)return'-';return Math.round(v).toLocaleString('zh-CN');}
function bc(b){if(b==null)return'bn';if(b>=2)return'bh';if(b>=1.5)return'bm';return'bl';}
function pass(r){
  if(fb==='1.5'&&(r.burst==null||r.burst<=1.5))return false;
  if(fb==='2'&&(r.burst==null||r.burst<=2))return false;
  if(fg==='10'&&r.feishi_gmv<100000)return false;
  if(fg==='50'&&r.feishi_gmv<500000)return false;
  if(fg==='100'&&r.feishi_gmv<1000000)return false;
  if(fc_!=='all'&&r.l1!==fc_)return false;
  return true;
}
function render(){
  const tb=document.getElementById('tb');tb.innerHTML='';
  let cnt=0,tg=0,to=0,bn=0,bd=0;
  const sorted=[...D].sort((a,b)=>(b.feishi_gmv??-Infinity)-(a.feishi_gmv??-Infinity));
  sorted.forEach(r=>{
    if(!pass(r))return;cnt++;tg+=r.feishi_gmv;to+=r.feishi_ord;
    if(r.burst!=null){bn+=r.burst*r.feishi_gmv;bd+=r.feishi_gmv;}
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${r.l1}</td><td>${r.l2}</td><td>${r.l3}</td><td class="${bc(r.burst)}">${r.burst!=null?r.burst.toFixed(2):'-'}</td><td>${fmt(r.feishi_gmv)}</td><td>${fmt(r.feishi_ord)}</td><td>${fmt(r.feishi_exp)}</td><td>${fmt(r.feishi_buy)}</td><td>${fmt(r.sg_gmv)}</td><td>${fmt(r.sg_ord)}</td><td>${fmt(r.sg_exp)}</td><td>${fmt(r.sg_buy)}</td><td>${fmt(r.ss_exp)}</td><td>${fmt(r.ss_buy)}</td><td>${fmt(r.base_feishi_gmv)}</td><td>${fmt(r.base_feishi_ord)}</td>`;
    tb.appendChild(tr);
  });
  document.getElementById('vc').textContent=cnt;
  document.getElementById('sc1').textContent=cnt.toLocaleString();
  document.getElementById('sc2').textContent=Math.round(tg).toLocaleString('zh-CN');
  document.getElementById('sc3').textContent=Math.round(to).toLocaleString('zh-CN');
  document.getElementById('sc4').textContent=bd>0?(bn/bd).toFixed(2):'-';
  document.getElementById('nd').style.display=cnt===0?'block':'none';
}
function sf(t,v,btn){
  if(t==='b'){fb=v;document.querySelectorAll('.filter-group:nth-child(1) .filter-btn').forEach(b=>b.classList.remove('active'));}
  else if(t==='g'){fg=v;document.querySelectorAll('.filter-group:nth-child(3) .filter-btn').forEach(b=>b.classList.remove('active'));}
  if(btn)btn.classList.add('active');render();
}
function fc(v){fc_=v;render();}
const cats=[...new Set(D.map(r=>r.l1))].sort();
const sel=document.getElementById('csel');
cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
render();
